services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cariinkerja}
      POSTGRES_USER: ${POSTGRES_USER:-cariinkerja}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cariinkerja}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    image: redis:7-alpine

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env.docker
    environment:
      ROLE: web
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8006:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: api.cariinkerja.id", "http://localhost:8000/login/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env.docker
    environment:
      ROLE: worker
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: ["uv", "run", "celery", "-A", "core", "worker",
              "-l", "info",
              "--concurrency=2",
              "--prefetch-multiplier=1",
              "--max-tasks-per-child=50",
              "--time-limit=600",
              "--soft-time-limit=540"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env.docker
    environment:
      ROLE: beat
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command:
      - "uv"
      - "run"
      - "celery"
      - "-A"
      - "core"
      - "beat"
      - "-l"
      - "info"
      - "--scheduler"
      - "django_celery_beat.schedulers:DatabaseScheduler"
      - "--max-interval"
      - "60"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    ports:
      - "3005:3000"

volumes:
  pgdata:
