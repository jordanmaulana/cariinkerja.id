services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cariinkerja}
      POSTGRES_USER: ${POSTGRES_USER:-cariinkerja}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cariinkerja}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env.docker
    environment:
      ROLE: web
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8006:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env.docker
    environment:
      ROLE: worker
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: ["uv", "run", "celery", "-A", "core", "worker", "-l", "info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env.docker
    environment:
      ROLE: beat
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command:
      - "uv"
      - "run"
      - "celery"
      - "-A"
      - "core"
      - "beat"
      - "-l"
      - "info"
      - "--scheduler"
      - "django_celery_beat.schedulers:DatabaseScheduler"
    depends_on:
      backend:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    ports:
      - "3005:3000"

volumes:
  pgdata:
