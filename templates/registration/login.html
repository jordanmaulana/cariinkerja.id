{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login — cariinkerja.id Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'output.css' %}" />
  </head>
  <body class="bg-gray-100">
    <main class="flex h-screen overflow-hidden">
      <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md h-min m-auto">
        <div class="flex items-center justify-center gap-2 mb-6">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" class="w-7 h-7" aria-hidden="true">
            <defs>
              <linearGradient id="logoBg-login" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#1a1424"/>
                <stop offset="100%" stop-color="#050308"/>
              </linearGradient>
            </defs>
            <rect x="0" y="0" width="240" height="240" rx="48" fill="url(#logoBg-login)"/>
            <circle cx="120" cy="120" r="92" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="12"/>
            <circle cx="120" cy="120" r="92" fill="none" stroke="#863bff" stroke-width="12" stroke-linecap="round" stroke-dasharray="531.9 46.3" transform="rotate(-90 120 120)"/>
            <text x="120" y="156" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="800" font-size="120" letter-spacing="-4" fill="#ffffff">92</text>
          </svg>
          <h2 class="text-2xl font-semibold text-gray-900">cariinkerja<span class="opacity-70">.id</span> Admin</h2>
        </div>
        {% if form.errors %}
          <div class="bg-red-100 text-red-700 p-4 rounded mb-4">
            Username or password incorrect.
          </div>
        {% endif %}
        <form method="post" class="space-y-4">
          {% csrf_token %}
          <div>
            <label for="id_username" class="block text-sm font-medium text-gray-700">Username</label>
            <input type="text" name="username" id="id_username" autofocus
                   class="mt-1 block w-full px-4 py-2 border rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 border-gray-300" />
          </div>
          <div>
            <label for="id_password" class="block text-sm font-medium text-gray-700">Password</label>
            <input type="password" name="password" id="id_password"
                   class="mt-1 block w-full px-4 py-2 border rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 border-gray-300" />
          </div>
          <button type="submit"
                  class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition cursor-pointer">
            Log In
          </button>
        </form>
      </div>
    </main>
  </body>
</html>
